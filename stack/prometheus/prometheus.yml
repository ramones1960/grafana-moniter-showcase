global:
  scrape_interval: 5s
  evaluation_interval: 10s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # シミュレータが公開する衛星ヘルスの業務メトリクス + プロセスメトリクス
  - job_name: satellite
    static_configs:
      - targets: ["simulator:8000"]
        labels:
          mission: spaceops
          sat: SAT-1

  # Prometheus 自身
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
